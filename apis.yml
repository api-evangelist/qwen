aid: qwen
url: https://raw.githubusercontent.com/api-evangelist/qwen/refs/heads/main/apis.yml
name: Qwen
kind: company
description: >-
  Qwen is Alibaba's large language model family, including Qwen3-Max, Qwen3.5-Plus,
  Qwen3.5-Flash, Qwen3-VL (vision), Qwen-Coder, Qwen-Audio, and Qwen open-source weights.
  APIs are exposed via Alibaba Cloud Model Studio (DashScope) with per-token pricing
  across multiple regions. The qwen.ai consumer site fronts the chat product.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - AI
  - LLM
  - Inference
  - Open Source
  - Alibaba
  - Multimodal
created: '2026-05-08'
modified: '2026-05-08'
specificationVersion: '0.19'
apis:
  - aid: qwen:dashscope
    name: DashScope (Alibaba Cloud Model Studio) API
    description: >-
      Native Alibaba Cloud Model Studio API serving the Qwen model family. Provides chat
      completions, multimodal vision, embeddings, audio (TTS/ASR), image generation, video
      generation, function calling, and tool use. Both DashScope-native and OpenAI-compatible
      endpoints. Multiple regional base URLs (Singapore, US-Virginia, HK, Frankfurt, Beijing).
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.alibabacloud.com/help/en/model-studio
    baseURL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    tags:
      - AI
      - LLM
      - Chat Completions
      - Vision
      - Embeddings
      - Audio
      - Image Generation
      - Video Generation
      - OpenAI Compatible
