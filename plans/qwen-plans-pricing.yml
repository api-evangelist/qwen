- Plans
description: >-
  Pay-as-you-go per-token pricing across the Qwen model family on Alibaba Cloud Model Studio
  (DashScope). Tiered by context-length window. Free open-weight self-hosting available for
  Qwen2.5/Qwen3 open variants.
notes: >-
  Pricing tiers are stratified by input context size (0-32K, 32-128K, 128-256K, 256K-1M).
  International pricing in USD; mainland-China pricing in CNY. Sample rates as of May 2026:
  Qwen3-Max input $1.2/M up to 32K and $3/M at 128-252K. Qwen3.5-Plus input $0.4/M up to 256K.
  Qwen3.5-Flash input $0.1/M up to 128K. Qwen3-VL-Plus input $0.2/M up to 32K.
sources:
- https://www.alibabacloud.com/help/en/model-studio/models
- https://www.alibabacloud.com/help/en/model-studio/get-api-key
